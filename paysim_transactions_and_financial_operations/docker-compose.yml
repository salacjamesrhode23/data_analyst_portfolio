version: "3.8"

services:
  postgres:
    container_name: postgres_db
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: salacjamesrhode23
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: paysim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./dataset:/dataset

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: "salacjamesrhode23@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "password123"
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
    ports:
      - "8085:80"
    depends_on:
      - postgres

volumes:
  postgres-data:
  pgadmin_data: